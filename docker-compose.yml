services:
  client:
    build:
      context: ./client
    environment:
      - VITE_PROXY_URL=http://loadbalancer:3001
      - VITE_WSS_URL=ws://loadbalancer:8080
    ports:
      - "3000:3000"
    depends_on:
      - loadbalancer

  loadbalancer:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "3001:3001"
      - "8080:8080"
    depends_on:
      - server-api
      - server-ws

  server-api:
    build:
      context: ./server-api
    deploy:
      mode: replicated
      replicas: 10
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - DATABASE_URL=mongodb://mongo:27017
      - DATABASE_NAME=messages_db
      - MQ_SERVER_URL=redis:6379
    depends_on:
      - mongo
      - redis

  server-ws:
    build:
      context: ./server-ws
    deploy:
      mode: replicated
      replicas: 10
    environment:
      - API_SERVER_URL=http://loadbalancer:3001
      - MQ_SERVER_URL=redis:6379
    depends_on:
      - redis
      - server-api

  mongo:
    image: mongo
    command: mongod --quiet --logpath /dev/null 
    ports:
      - "27017:27017"

  redis:
    image: redis
    ports:
      - "6379:6379"